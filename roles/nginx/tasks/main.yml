---
- name: Install nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Configure nginx load balancer
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/flask-lb
    mode: "0644"
  notify: reload nginx

- name: Enable site
  file:
    src: /etc/nginx/sites-available/flask-lb
    dest: /etc/nginx/sites-enabled/flask-lb
    state: link
  notify: reload nginx

- name: Remove default site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Start nginx
  service:
    name: nginx
    state: started
    enabled: yes
